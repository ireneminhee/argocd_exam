apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: echo-hostname
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-github-id/app_exam-k8s.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
